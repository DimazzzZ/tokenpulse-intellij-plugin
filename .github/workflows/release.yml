name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.0)'
        required: true
        type: string
      publish_to_marketplace:
        description: 'Publish to JetBrains Marketplace'
        required: true
        type: boolean
        default: true

env:
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      is_prerelease: ${{ steps.extract-version.outputs.is_prerelease }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Extract version
      id: extract-version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
        fi
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
        # Check if this is a prerelease (contains alpha, beta, rc)
        if [[ $VERSION =~ (alpha|beta|rc) ]]; then
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
        fi
        
        echo "Release version: $VERSION"
        echo "Is prerelease: $(echo $VERSION | grep -E '(alpha|beta|rc)' && echo 'true' || echo 'false')"

  build-and-test:
    needs: validate-version
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: false

    - name: Update version in gradle.properties
      run: |
        sed -i "s/^pluginVersion = .*/pluginVersion = ${{ needs.validate-version.outputs.version }}/" gradle.properties
        echo "Updated plugin version to ${{ needs.validate-version.outputs.version }}"

    - name: Build, test, and analyze
      run: ./gradlew buildPlugin test detekt verifyPlugin --build-cache
    
    - name: Validate plugin archive integrity
      run: |
        PLUGIN_ZIP=$(ls build/distributions/token-pulse-*.zip 2>/dev/null | head -1)
        if [ -z "$PLUGIN_ZIP" ]; then
          echo "ERROR: No plugin ZIP found in build/distributions/"
          exit 1
        fi
        echo "Validating: $PLUGIN_ZIP"
        unzip -t "$PLUGIN_ZIP"
        unzip -l "$PLUGIN_ZIP" | grep -E "token-pulse/lib/token-pulse.*\.jar$" || (echo "ERROR: Missing main plugin JAR" && exit 1)
        sha256sum "$PLUGIN_ZIP" | tee "${PLUGIN_ZIP}.sha256"
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: plugin-artifact
        path: |
          build/distributions/token-pulse-*.zip
          build/distributions/token-pulse-*.zip.sha256
        retention-days: 30

  create-release:
    needs: [validate-version, build-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: true
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: plugin-artifact
        path: build/distributions/
    
    - name: Generate changelog
      id: changelog
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          CHANGELOG="Initial release"
        else
          CHANGELOG=$(git log --pretty=format:"- %s" $LAST_TAG..HEAD | head -20)
        fi
        
        echo "## What's Changed" > changelog.md
        echo "" >> changelog.md
        if [ "$CHANGELOG" = "Initial release" ]; then
          echo "Initial release of the TokenPulse IntelliJ Plugin" >> changelog.md
        else
          echo "$CHANGELOG" >> changelog.md
        fi
        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${{ needs.validate-version.outputs.version }}" >> changelog.md
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat changelog.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.validate-version.outputs.version }}
        name: Release ${{ needs.validate-version.outputs.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        prerelease: ${{ needs.validate-version.outputs.is_prerelease }}
        files: build/distributions/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-marketplace:
    needs: [validate-version, build-and-test, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_marketplace == 'true')

    steps:
    - name: Validate required secrets
      run: |
        missing_secrets=""
        if [ -z "${{ secrets.PUBLISH_TOKEN }}" ]; then
          missing_secrets="${missing_secrets}PUBLISH_TOKEN "
        fi
        if [ -z "${{ secrets.CERTIFICATE_CHAIN }}" ]; then
          missing_secrets="${missing_secrets}CERTIFICATE_CHAIN "
        fi
        if [ -z "${{ secrets.PRIVATE_KEY }}" ]; then
          missing_secrets="${missing_secrets}PRIVATE_KEY "
        fi
        if [ -z "${{ secrets.PRIVATE_KEY_PASSWORD }}" ]; then
          missing_secrets="${missing_secrets}PRIVATE_KEY_PASSWORD "
        fi
        
        if [ -n "$missing_secrets" ]; then
          echo "::error::Missing required secrets for marketplace publishing: ${missing_secrets}"
          echo ""
          echo "Please configure the following secrets in your repository settings:"
          echo "  Settings -> Secrets and variables -> Actions -> New repository secret"
          echo ""
          echo "Required secrets:"
          echo "  - PUBLISH_TOKEN: Your JetBrains Marketplace plugin upload token"
          echo "    Get it from: https://plugins.jetbrains.com/author/me/tokens"
          echo ""
          echo "  - CERTIFICATE_CHAIN: Your plugin signing certificate chain (PEM format)"
          echo "  - PRIVATE_KEY: Your plugin signing private key (PEM format)"
          echo "  - PRIVATE_KEY_PASSWORD: Password for the private key"
          echo "    Generate signing keys: https://plugins.jetbrains.com/docs/intellij/plugin-signing.html"
          exit 1
        fi
        echo "All required secrets are configured."

    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: true

    - name: Update version in gradle.properties
      run: |
        sed -i "s/^pluginVersion = .*/pluginVersion = ${{ needs.validate-version.outputs.version }}/" gradle.properties
        echo "Updated plugin version to ${{ needs.validate-version.outputs.version }}"

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: plugin-artifact
        path: build/distributions/

    - name: Final archive validation before publish
      run: |
        PLUGIN_ZIP=$(ls build/distributions/token-pulse-*.zip 2>/dev/null | head -1)
        if [ -z "$PLUGIN_ZIP" ]; then
          echo "ERROR: No plugin ZIP found in build/distributions/"
          exit 1
        fi
        echo "Final validation before publish: $PLUGIN_ZIP"
        unzip -t "$PLUGIN_ZIP"
        unzip -l "$PLUGIN_ZIP" | grep -E "token-pulse/lib/token-pulse.*\.jar$" || (echo "ERROR: Missing main plugin JAR" && exit 1)
        echo "SHA256: $(sha256sum "$PLUGIN_ZIP" | cut -d' ' -f1)"

    - name: Sign and publish plugin to JetBrains Marketplace
      run: ./gradlew signPlugin publishPlugin --build-cache
      env:
        CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
        PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
    
    - name: Update release with marketplace link
      uses: actions/github-script@v6
      with:
        script: |
          const release = await github.rest.repos.getReleaseByTag({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag: 'v${{ needs.validate-version.outputs.version }}'
          });

          const marketplaceLink = '\n\n---\n\n🎉 **Plugin Published!**\n\nThe plugin has been successfully published to the JetBrains Marketplace.\n\n📦 [View on Marketplace](https://plugins.jetbrains.com/plugin/org.zhavoronkov.tokenpulse)';

          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: release.data.id,
            body: release.data.body + marketplaceLink
          });
