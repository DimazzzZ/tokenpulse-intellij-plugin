name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Cancel superseded PR runs so a new push doesn't wait behind a stale one.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Skip the ~23s headless-IDE buildSearchableOptions task on CI verification.
  # The release workflow does NOT set this, so releases still generate it.
  SKIP_SEARCHABLE_OPTIONS: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          # No `cache: gradle` here — gradle/actions/setup-gradle owns caching
          # and the two conflict if both are enabled.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Write caches for internal branch pushes and same-repo PRs; keep
          # read-only for untrusted fork PRs so they can't poison the cache.
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Test
        run: ./gradlew test platformTest koverVerify --build-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/

  lint:
    name: Lint (Detekt)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Detekt
        run: ./gradlew detekt detektSarif --build-cache

      - name: Detekt SARIF diagnostics
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          SARIF_PATH="build/reports/detekt/detekt.sarif"
          if [[ ! -f "$SARIF_PATH" ]]; then
            echo "Detekt SARIF diagnostics: file not found at $SARIF_PATH"
            exit 0
          fi

          FILE_SIZE=$(wc -c < "$SARIF_PATH" | tr -d ' ')
          RUNS=$(jq '.runs | length' "$SARIF_PATH" 2>/dev/null || echo 0)
          RULES=$(jq '[.runs[].tool.driver.rules | length] | add // 0' "$SARIF_PATH" 2>/dev/null || echo 0)
          RESULTS=$(jq '[.runs[].results | length] | add // 0' "$SARIF_PATH" 2>/dev/null || echo 0)

          echo "Detekt SARIF diagnostics"
          echo "- file size: ${FILE_SIZE} bytes"
          echo "- runs: ${RUNS}"
          echo "- rules: ${RULES}"
          echo "- total results: ${RESULTS}"
          echo "Top 20 ruleIds by count:"
          jq -r '.runs[].results[]?.ruleId? // empty' "$SARIF_PATH" 2>/dev/null \
            | sort | uniq -c | sort -nr | head -20 || true

      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: build/reports/detekt/detekt.sarif
          category: detekt

      - name: Upload Detekt reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-reports
          path: build/reports/detekt/

  results:
    name: PR results
    needs: [ test, lint ]
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download Detekt reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: detekt-reports
          path: detekt-reports

      - name: Comment PR with Detekt results
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            try {
              const detektReport = fs.readFileSync('detekt-reports/detekt.txt', 'utf8');
              if (detektReport.includes('Build failed with 1 exception')) {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: 'ℹ️ **Detekt found code quality suggestions**\n\nThese are recommendations, not blockers. Check the Detekt reports in the CI artifacts for details.'
                });
              }
            } catch (error) {
              console.log('No Detekt report found or error reading it:', error.message);
            }
